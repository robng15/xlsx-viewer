<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spreadsheet Viewer</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="header-inner">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="8" y1="13" x2="16" y2="13"/>
          <line x1="8" y1="17" x2="16" y2="17"/>
        </svg>
        <h1>Spreadsheet Viewer</h1>
      </div>
    </header>

    <main class="app-main">
      <!-- Upload Section -->
      <section id="upload-section" class="upload-section">
        <div
          id="drop-zone"
          class="drop-zone"
          role="button"
          tabindex="0"
          aria-label="Upload spreadsheet file"
        >
          <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <p class="drop-text">Drop your spreadsheet here</p>
          <p class="drop-sub">or</p>
          <label for="file-input" class="browse-btn">Browse Files</label>
          <input type="file" id="file-input" accept=".xls,.xlsx" aria-label="Upload spreadsheet">
          <p class="supported-formats">Supports XLS &amp; XLSX &nbsp;&middot;&nbsp; Raw values &nbsp;&middot;&nbsp; Formatting preserved</p>
        </div>
      </section>

      <!-- Viewer Section -->
      <section id="viewer-section" class="viewer-section hidden">
        <div class="viewer-toolbar">
          <div class="file-info">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
            <span id="file-name-display" class="file-name"></span>
            <span id="file-meta" class="file-meta"></span>
          </div>
          <button id="clear-btn" class="clear-btn" title="Open another file">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="12" height="12">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
            Close
          </button>
        </div>

        <div id="sheet-tabs" class="sheet-tabs" role="tablist" aria-label="Worksheets"></div>

        <div id="table-container" class="table-container">
          <div id="loading-indicator" class="loading-indicator hidden">
            <div class="spinner"></div>
            <span>Loading sheet&hellip;</span>
          </div>
          <div id="table-wrapper" class="table-wrapper"></div>
        </div>
      </section>
    </main>
  </div>

  <div id="error-toast" class="error-toast hidden" role="alert" aria-live="assertive"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
